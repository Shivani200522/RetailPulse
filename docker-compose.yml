services:

  kafka:
    image: apache/kafka:latest
    container_name: retailpulse-kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:16
    container_name: retailpulse-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: retailpulse
      POSTGRES_PASSWORD: retailpulse
      POSTGRES_DB: retailpulse

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  spark-master:
    image: apache/spark:4.0.1
    container_name: retailpulse-spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    environment:
      SPARK_SUBMIT_OPTIONS: "--packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.1"

    ports:
      - "8080:8080"
      - "7077:7077"

  spark-worker:
    image: apache/spark:4.0.1
    container_name: retailpulse-spark-worker

    depends_on:
      - spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://retailpulse-spark-master:7077

    environment:
      SPARK_SUBMIT_OPTIONS: "--packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.1"

volumes:
  postgres_data: